name: Update Tailscale Version

on:
  schedule:
    - cron: "0 */12 * * *" # Bi-daily UTC
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.PAT_UPDATE }}

      - name: Get latest Tailscale stable version
        id: versions
        run: |
          LATEST=$(
            curl -sL https://pkgs.tailscale.com/stable/ \
              | grep -oP 'tailscale_\K\d+\.\d+\.\d+(?=_amd64\.tgz)' \
              | sort -V \
              | tail -1
          )
          if [ -z "$LATEST" ]; then
            echo "Failed to fetch latest Tailscale version" >&2
            exit 1
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest version: $LATEST"

      - name: Get current version
        id: current
        run: |
          VERSION=$(jq -r '.args.TAILSCALE_VERSION' tailscale/build.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Determine target version
        id: target
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          LATEST: ${{ steps.versions.outputs.latest }}
        run: |
          # Sort the two versions and compare - if latest sorts below current,
          # the current version was pulled upstream and we need to move back.
          HIGHER=$(printf '%s\n' "$CURRENT" "$LATEST" | sort -V | tail -1)
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "mode=noop" >> "$GITHUB_OUTPUT"
            echo "Target: no change needed"
          elif [ "$HIGHER" = "$LATEST" ]; then
            echo "version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "mode=update" >> "$GITHUB_OUTPUT"
            echo "Target: update to $LATEST"
          else
            # LATEST sorted below CURRENT - upstream pulled the current version
            echo "version=$LATEST" >> "$GITHUB_OUTPUT"
            echo "mode=revert" >> "$GITHUB_OUTPUT"
            echo "WARNING: Current version $CURRENT appears to have been pulled - reverting to $LATEST"
          fi

      - name: Apply version change
        if: steps.target.outputs.mode != 'noop'
        env:
          NEW: ${{ steps.target.outputs.version }}
          OLD: ${{ steps.current.outputs.version }}
          MODE: ${{ steps.target.outputs.mode }}
        run: |
          echo "$MODE: $OLD → $NEW"

          OLD_ESC="${OLD//./\\.}"

          # tailscale/Dockerfile
          sed -i \
            "s/ARG TAILSCALE_VERSION=\"${OLD_ESC}\"/ARG TAILSCALE_VERSION=\"${NEW}\"/" \
            tailscale/Dockerfile

          # tailscale/build.json
          sed -i \
            "s/\"TAILSCALE_VERSION\": \"${OLD_ESC}\"/\"TAILSCALE_VERSION\": \"${NEW}\"/" \
            tailscale/build.json

          # tailscale/config.json
          sed -i \
            "s/\"version\": \"${OLD_ESC}\.0\"/\"version\": \"${NEW}.0\"/" \
            tailscale/config.json

          # tailscale/CHANGELOG.md
          if [ "$MODE" = "revert" ]; then
            CHANGELOG_ENTRY="- Tailscale updated from \`${OLD}\` to \`${NEW}\` - upstream version \`${OLD}\` was pulled"
          else
            CHANGELOG_ENTRY="- Tailscale package updated to version \`${NEW}\`"
          fi

          awk -v new="$NEW" -v entry="$CHANGELOG_ENTRY" '
            /^# Changelog/ {
              print
              print ""
              print "## " new ".0"
              print ""
              print entry
              print ""
              next
            }
            { print }
          ' tailscale/CHANGELOG.md > /tmp/CHANGELOG.tmp
          mv /tmp/CHANGELOG.tmp tailscale/CHANGELOG.md

      - name: Verify changes
        if: steps.target.outputs.mode != 'noop'
        run: |
          echo "=== Dockerfile ===" && grep TAILSCALE_VERSION tailscale/Dockerfile
          echo "=== build.json ===" && cat tailscale/build.json
          echo "=== config.json (version) ===" && grep '"version"' tailscale/config.json
          echo "=== CHANGELOG (head) ===" && head -10 tailscale/CHANGELOG.md

      - name: Commit and push
        if: steps.target.outputs.mode != 'noop'
        env:
          NEW: ${{ steps.target.outputs.version }}
          OLD: ${{ steps.current.outputs.version }}
          MODE: ${{ steps.target.outputs.mode }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            tailscale/CHANGELOG.md \
            tailscale/Dockerfile \
            tailscale/build.json \
            tailscale/config.json
          if [ "$MODE" = "revert" ]; then
            git commit -m "chore: update Tailscale version to ${NEW} - upstream version ${OLD} was pulled"
          else
            git commit -m "chore: update Tailscale version to ${NEW}"
          fi
          git push

      - name: No update needed
        if: steps.target.outputs.mode == 'noop'
        run: echo "Already on latest Tailscale version (${{
          steps.current.outputs.version }}), nothing to do."
